services:
  - type: web
    name: ai-traffic-simulator-backend
    env: python
    region: oregon
    branch: main
    root: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FRONTEND_URL
        value: https://ai-traffic-simulator-frontend.onrender.com

  - type: static
    name: ai-traffic-simulator-frontend
    env: static
    region: oregon
    branch: main
    root: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: https://ai-traffic-simulator-backend.onrender.com
